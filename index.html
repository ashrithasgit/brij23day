<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="birthday\Screenshot 2025-05-26 222644.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!!!</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <h1 id="headline">Countdown to Brijraj's birthday</h1>
    <div id="countdown">
      <ul>
        <li>
          <span id="days"></span>
          <div class="label">Days</div>
        </li>
        <li>
          <span id="hours"></span>
          <div class="label">Hours</div>
        </li>
        <li>
          <span id="minutes"></span>
          <div class="label">Minutes</div>
        </li>
        <li>
          <span id="seconds"></span>
          <div class="label">Seconds</div>
        </li>
      </ul>
    </div>
    <button id="celebrate-btn" style="display: none; margin-top: 1.5rem; padding: 1rem 2rem; font-size: 1.5rem; cursor: pointer; background-color: #b00000; border: none; color: rgb(0, 0, 0); border-radius: 5px;">
      Click to grow older
    </button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
