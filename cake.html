<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Cake</title>
  <style>
    @font-face {
      font-family: "Roomach";
      src: url("./Roomach-Regular.woff2") format("woff2"),
           url("./Roomach-Regular.woff") format("woff");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;

    }

    body {
      background: linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #1a0000 100%);
      color: #ff3333;
      font-family: 'Roomach', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(74, 0, 0, 0.5) 0%, rgba(26, 0, 0, 1) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #canvas-container {
      width: 100%;
      height: 80%;
      position: relative;
      z-index: 1;
    }

    canvas {
      display: block;
      filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.3));
    }

    #message {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      text-align: center;
      color: #ff3333;
      font-family: 'Roomach', sans-serif;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      z-index: 9999;
      background: rgba(26, 0, 0, 0.7);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 0, 0, 0.3);
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      50% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div id="canvas-container"></div>
  <div id="message">Congratulations on turning 22, unc!</div>

  <!-- Load script from correct location -->
  <script type="module" src="./src/cake.js"></script>
  <script>
    // Add floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.width = Math.random() * 20 + 10 + 'px';
      particle.style.height = particle.style.width;
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
