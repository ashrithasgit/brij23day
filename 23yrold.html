<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Age 23</title>
  <style>
    @font-face {
      font-family: "Roomach";
      src: url("./Roomach-Regular.woff2") format("woff2"),
           url("./Roomach-Regular.woff") format("woff");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: 
        radial-gradient(circle at 20% 50%, rgba(10, 30, 70, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(20, 40, 80, 0.3) 0%, transparent 50%),
        linear-gradient(135deg, #0a1a3a 0%, #051027 50%, #0a1a3a 100%);
      color: #d4a574;
      font-family: 'Roomach', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(10, 40, 80, 0.2) 0%, rgba(5, 16, 39, 1) 100%);
      pointer-events: none;
      z-index: 0;
      animation: eerieBreath 8s ease-in-out infinite;
    }

    @keyframes eerieBreath {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    #canvas-container {
      width: 100%;
      height: 60%;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #message {
      position: relative;
      font-size: 2rem;
      text-align: center;
      color: #3d2817;
      font-family: 'Roomach', sans-serif;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      z-index: 9999;
      background: 
        linear-gradient(135deg, #e8d7c3 0%, #d9c5ae 50%, #e8d7c3 100%);
      padding: 2.5rem;
      border-radius: 2px;
      border: 2px solid #8b7355;
      margin-bottom: 2rem;
      box-shadow: 
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2),
        0 8px 16px rgba(0, 0, 0, 0.7),
        0 0 30px rgba(0, 0, 0, 0.5);
      position: relative;
      max-width: 500px;
    }

    #message::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(139, 115, 85, 0.05) 2px,
          rgba(139, 115, 85, 0.05) 4px
        ),
        radial-gradient(ellipse at 20% 50%, rgba(180, 100, 40, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(100, 60, 30, 0.08) 0%, transparent 50%);
      pointer-events: none;
      border-radius: 2px;
    }

    #message::after {
      content: '';
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      bottom: 5px;
      background: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
      pointer-events: none;
      border-radius: 0;
    }

    #message span {
      position: relative;
      z-index: 10;
    }

    #download-btn {
      background: linear-gradient(135deg, #0a3d7a 0%, #1e5a96 100%);
      color: white;
      font-family: 'Roomach', sans-serif;
      font-size: 1.5rem;
      padding: 1.2rem 2.5rem;
      border: 3px solid #051a42;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      box-shadow: 
        0 6px 12px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(100, 150, 200, 0.2);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
    }

    #download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 10px 20px rgba(10, 61, 122, 0.6),
        inset 0 1px 0 rgba(100, 150, 200, 0.2);
      background: linear-gradient(135deg, #1e5a96 0%, #0a3d7a 100%);
    }

    #download-btn:active {
      transform: translateY(-1px);
      box-shadow: 
        0 4px 8px rgba(10, 61, 122, 0.4),
        inset 0 1px 0 rgba(100, 150, 200, 0.2);
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(10, 150, 200, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s infinite linear;
      opacity: 0.3;
    }

    @keyframes float {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      50% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100vh) translateX(50px);
        opacity: 0;
      }
    }

    .content-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="content-wrapper">
    <div id="message"><span> 23 year oldman lmao <br>I love you anyway. Happy Birthday cutie:)</span></div>
    <a id="download-btn" href="./Brijdayvirus23.zip" download>Download Virus</a>
  </div>

  <script>
    // Add floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.width = Math.random() * 20 + 10 + 'px';
      particle.style.height = particle.style.width;
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
